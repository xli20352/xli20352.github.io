    <script>
        // ... 其他已有函数 ...
        
        // 正确版本的 showPDF 函数（使用 Google Docs 预览，不带多余参数）
        function showPDF(pdfUrl) {
            const existing = document.getElementById('pdfLightbox');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'pdfLightbox';
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.backgroundColor = 'rgba(0,0,0,0.85)';
            overlay.style.zIndex = '9999';
            overlay.style.display = 'flex';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.cursor = 'pointer';

            const container = document.createElement('div');
            container.style.width = '90%';
            container.style.height = '90%';
            container.style.backgroundColor = '#fff';
            container.style.borderRadius = '16px';
            container.style.overflow = 'hidden';
            container.style.cursor = 'default';
            container.style.position = 'relative';

            const closeBtn = document.createElement('button');
            closeBtn.innerText = '✕';
            closeBtn.style.position = 'absolute';
            closeBtn.style.top = '10px';
            closeBtn.style.right = '20px';
            closeBtn.style.fontSize = '24px';
            closeBtn.style.backgroundColor = 'transparent';
            closeBtn.style.border = 'none';
            closeBtn.style.color = '#333';
            closeBtn.style.cursor = 'pointer';
            closeBtn.style.zIndex = '10000';
            closeBtn.onclick = (e) => {
                e.stopPropagation();
                overlay.remove();
            };

            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            // 正确的 Google Docs 预览 URL，只有 url 和 embedded 参数
            iframe.src = `https://docs.google.com/gview?url=${encodeURIComponent(pdfUrl)}&embedded=true`;

            container.appendChild(iframe);
            container.appendChild(closeBtn);
            overlay.appendChild(container);
            overlay.onclick = (e) => {
                if (e.target === overlay) overlay.remove();
            };
            document.body.appendChild(overlay);
        }
    </script>
